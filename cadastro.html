<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<style>
body {
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    font-family: Arial;
    padding: 20px;
    color: white;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    color: black;
}

input {
    display: block;
    width: 570px;
    margin: 10px 0;
    padding: 10px;
}

button {
    padding: 10px;
    border: none;
    cursor: pointer;
    margin-top: 10px;
}

.cadastrar { background: #28a745; color: white; }
.ver { background: #2a5298; color: white; }
</style>
</head>

<body>

<div class="container">
    <h2>Cadastro</h2>

    <input type="text" id="nome" placeholder="Nome">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="telefone" placeholder="Telefone">
    <input type="text" id="cpf" placeholder="CPF">

    <button class="cadastrar" onclick="cadastrar()">Cadastrar</button>

    <!-- ✅ BOTÃO CORRIGIDO -->
    <button class="ver" onclick="irParaClientes()">Ver Clientes</button>
</div>

<!-- ✅ SCRIPT CORRETO -->
</script>
    <script src="cadastro.js"></script>
<script>
function irParaClientes() {
    window.location.href = "clientes.html";
}
</script>

</body>
</html>
